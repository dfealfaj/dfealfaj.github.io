title: Daniel Feal - My projects
description: I am an aerospace engineer and Master’s degree student from Spain. I have been working for over two years in the aeronautical industry and, right now, I am also studying a Master’s in Big Data, Data Science and Artificial Intelligence. On top of the projects I do for my master’s, I have started working on some other projects on my own to get more hands-on experience. The aim of this page is to share those projects.
